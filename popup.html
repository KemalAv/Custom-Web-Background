<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom Web Background</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h3>Custom Web Background</h3>
            <div class="toggle-switch">
                <label for="enabledCheckbox">Enable Extension</label>
                <input type="checkbox" id="enabledCheckbox" checked>
            </div>
        </header>

        <main id="settings-panel">

            <section class="form-group">
                <div class="toggle-switch">
                    <label for="animationsCheckbox" style="font-weight: normal;">Enable UI Animations</label>
                    <input type="checkbox" id="animationsCheckbox" checked>
                </div>
            </section>

            <section class="form-group" id="protectModalsSection">
                <div class="toggle-switch">
                    <label for="protectModalsCheckbox" style="font-weight: normal;">Protect Modals & Popups</label>
                    <input type="checkbox" id="protectModalsCheckbox">
                </div>
            </section>

            <section class="form-group">
                <div class="toggle-switch">
                    <label for="autoTextColorCheckbox" style="font-weight: normal;">Auto Correct Text Color</label>
                    <input type="checkbox" id="autoTextColorCheckbox" checked>
                </div>
                <div class="sub-option" id="ignoreElementBgSection" style="display: none;">
                    <div class="toggle-switch sub-toggle">
                        <label for="ignoreElementBgCheckbox" style="font-weight: normal; font-size: 12px;">Ignore Element Background</label>
                        <input type="checkbox" id="ignoreElementBgCheckbox">
                    </div>
                    <div style="font-size: 11px; color: #888; margin-top: 2px; padding-left: 4px;">When ON, text color always follows dim overlay mode, ignoring dark/light element backgrounds.</div>
                </div>
            </section>

            <section class="form-group">
                <label>UI Mode:</label>
                <div class="radio-group" id="uiModeGroup">
                    <label><input type="radio" name="uiMode" value="chroma" checked> Chroma Key (Default)</label>
                    <label><input type="radio" name="uiMode" value="glass"> Glass UI</label>
                </div>
            </section>

            <section class="form-group">
                <label>Background Media (JPG, PNG, GIF, MP4)</label>
                <div class="video-note" style="font-size: 11px; margin-bottom: 6px; color: #666;">
                    Supports images and MP4 video backgrounds.
                </div>
                <input type="file" id="imageUpload" accept="image/jpeg,image/png,image/gif,video/mp4" hidden>
                <button id="uploadButton" class="button-secondary">Choose File...</button>
                <span id="currentImageName">Using default image.</span>
            </section>

            <section class="form-group">
                <label>Or Enter Media URL</label>
                <input type="url" id="imageUrlInput" placeholder="https://example.com/image.jpg"
                    style="width: 100%; margin-top: 6px; padding: 6px;">
                <button id="applyUrlButton" class="button-secondary" style="margin-top: 6px;">Apply URL</button>
            </section>

            <section class="form-group">
                <label for="blurSlider">Background Blur: <span id="blurValue">0px</span></label>
                <input type="range" id="blurSlider" min="0" max="30" step="1" value="0">
            </section>

            <section class="form-group">
                <label for="dimLevel">Background Dim: <span id="dimValue">40%</span></label>
                <input type="range" id="dimLevel" min="0" max="1" step="0.05">
            </section>

            <section class="form-group">
                <label>Dim Overlay Color:</label>
                <div class="radio-group" id="dimColorGroup">
                    <label><input type="radio" name="dimColor" value="dark" checked> Dark</label>
                    <label><input type="radio" name="dimColor" value="light"> Light</label>
                </div>
            </section>

        </main>

        <footer>
            <button id="saveButton" class="button-primary">Apply & Save</button>
            <div id="status"></div>
            <p class="donate-link">
                Gimmie your money please:
                <a href="https://sociabuzz.com/kemalavicennafaza" target="_blank" rel="noopener noreferrer">
                    sociabuzz.com/kemalavicennafaza
                </a>
            </p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
